scenario:
  ontology_name: CollateralMarginReportingOntology
  description: OSI scenario for collateral margin regulatory reporting built from
    physical table metadata first.
  mapping_name: CollateralMarginSemanticMapping
  semantic_model_name: CollateralMarginSemanticModel
  semantic_model_description: Table-backed semantic model for collateral margin reporting.
  model_version: 1.0.0
  owner: Collateral Regulatory Reporting
  source_systems:
  - margin_core
  - collateral_master
  - market_risk
ontology:
  base_entities:
  - name: AccountData
    description: Base concept for account-like records with common identifiers and
      status fields.
    identify_by:
    - has_AccountIdentifier
    relationships:
    - name: has_AccountIdentifier
      roles:
      - concept: AccountIdentifier
      multiplicity: OneToOne
      verbalizes:
      - '{AccountData} has account identifier {AccountIdentifier}'
      description: Identifier common to account-like records.
    - name: has_AccountStatus
      roles:
      - concept: StatusCode
      multiplicity: ManyToOne
      verbalizes:
      - '{AccountData} has account status {StatusCode}'
      description: Status common to account-like records.
  - name: CollateralAssetData
    description: Base concept for collateral asset records with common collateral
      identifiers and classification fields.
    identify_by:
    - has_CollateralIdentifier
    relationships:
    - name: has_CollateralIdentifier
      roles:
      - concept: CollateralIdentifier
      multiplicity: OneToOne
      verbalizes:
      - '{CollateralAssetData} has collateral identifier {CollateralIdentifier}'
      description: Identifier common to collateral asset records.
    - name: has_AssetType
      roles:
      - concept: AssetType
      multiplicity: ManyToOne
      verbalizes:
      - '{CollateralAssetData} has asset type {AssetType}'
      description: Asset type common to collateral asset records.
    - name: has_AssetCurrency
      roles:
      - concept: CurrencyCode
      multiplicity: ManyToOne
      verbalizes:
      - '{CollateralAssetData} has currency {CurrencyCode}'
      description: Currency common to collateral asset records.
    - name: has_IssuerCountry
      roles:
      - concept: CountryCode
      multiplicity: ManyToOne
      verbalizes:
      - '{CollateralAssetData} has issuer country {CountryCode}'
      description: Issuer country common to collateral asset records.
  - name: CounterpartyData
    description: Base concept for counterparty-like records with legal identity and
      regulatory classification fields.
    identify_by:
    - has_CounterpartyIdentifier
    relationships:
    - name: has_CounterpartyIdentifier
      roles:
      - concept: CounterpartyIdentifier
      multiplicity: OneToOne
      verbalizes:
      - '{CounterpartyData} has counterparty identifier {CounterpartyIdentifier}'
      description: Identifier common to counterparty-like records.
    - name: has_LegalName
      roles:
      - concept: LegalName
      multiplicity: ManyToOne
      verbalizes:
      - '{CounterpartyData} has legal name {LegalName}'
      description: Legal name common to counterparty-like records.
    - name: has_DomicileCountry
      roles:
      - concept: CountryCode
      multiplicity: ManyToOne
      verbalizes:
      - '{CounterpartyData} has domicile country {CountryCode}'
      description: Domicile country common to counterparty-like records.
    - name: has_RegulatorySegment
      roles:
      - concept: RegulatorySegment
      multiplicity: ManyToOne
      verbalizes:
      - '{CounterpartyData} has regulatory segment {RegulatorySegment}'
      description: Regulatory segment common to counterparty-like records.
  - name: ValuationData
    description: Base concept for valuation records with common valuation identity
      and date fields.
    identify_by:
    - has_ValuationIdentifier
    relationships:
    - name: has_ValuationIdentifier
      roles:
      - concept: ValuationIdentifier
      multiplicity: OneToOne
      verbalizes:
      - '{ValuationData} has valuation identifier {ValuationIdentifier}'
      description: Identifier common to valuation records.
    - name: has_ValuationDate
      roles:
      - concept: Date
      multiplicity: ManyToOne
      verbalizes:
      - '{ValuationData} has valuation date {Date}'
      description: Date common to valuation records.
  entity_types:
  - name: CollateralAsset
    description: Asset pledged as collateral for margin obligations.
    extends:
    - CollateralAssetData
    identify_by:
    - has_CollateralIdentifier
    relationships:
    - name: PART_OF_MarginAccount
      roles:
      - concept: MarginAccount
      verbalizes:
      - '{CollateralAsset} is part of the collateral set for {MarginAccount}'
      description: Margin account whose obligations are supported by this collateral
        asset.
  - name: CollateralValuation
    description: Daily valuation record for collateral after market close.
    extends:
    - ValuationData
    identify_by:
    - has_ValuationIdentifier
    relationships:
    - name: VALUES_CollateralAsset
      roles:
      - concept: CollateralAsset
      multiplicity: ManyToOne
      verbalizes:
      - '{CollateralValuation} values {CollateralAsset}'
      description: Collateral asset whose market value and haircut are measured by
        this valuation.
    - name: has_MarketValueAmount
      roles:
      - concept: MonetaryAmount
      multiplicity: ManyToOne
      verbalizes:
      - '{CollateralValuation} has market value amount {MonetaryAmount}'
      description: Gross market value before haircut.
    - name: has_HaircutRate
      roles:
      - concept: Rate
      multiplicity: ManyToOne
      verbalizes:
      - '{CollateralValuation} has haircut rate {Rate}'
      description: Haircut rate applied to the collateral valuation.
    - name: has_EligibleCollateralValue
      roles:
      - concept: MonetaryAmount
      multiplicity: ManyToOne
      verbalizes:
      - '{CollateralValuation} has eligible collateral value {MonetaryAmount}'
      description: Market value after haircut represented as an entity-level calculated
        collateral valuation amount.
  - name: Counterparty
    description: Legal entity that owns margin accounts and posts collateral.
    extends:
    - CounterpartyData
    identify_by:
    - has_CounterpartyIdentifier
    relationships:
    - name: RELATED_TO_MarginAccount
      roles:
      - concept: MarginAccount
      verbalizes:
      - '{Counterparty} is related to {MarginAccount} through account ownership or
        control'
      description: Margin accounts owned or controlled by the counterparty.
  - name: MarginAccount
    description: Account used to hold margin obligations and pledged collateral.
    extends:
    - AccountData
    identify_by:
    - has_AccountIdentifier
    relationships:
    - name: REFERENCES_Counterparty
      roles:
      - concept: Counterparty
      multiplicity: ManyToOne
      verbalizes:
      - '{MarginAccount} is owned by {Counterparty}'
      description: Counterparty that owns or controls the margin account.
    - name: DEPENDS_ON_CollateralAsset
      roles:
      - concept: CollateralAsset
      verbalizes:
      - '{MarginAccount} depends on pledged {CollateralAsset} for margin coverage'
      description: Collateral assets pledged against this margin account.
    - name: has_BaseCurrency
      roles:
      - concept: CurrencyCode
      multiplicity: ManyToOne
      verbalizes:
      - '{MarginAccount} has base currency {CurrencyCode}'
      description: Currency used as the margin account base currency.
  value_types:
  - name: AccountIdentifier
    description: Identifier value assigned to an account.
  - name: CounterpartyIdentifier
    description: Identifier value assigned to a counterparty.
  - name: CollateralIdentifier
    description: Identifier value assigned to a collateral asset.
  - name: ValuationIdentifier
    description: Identifier value assigned to a valuation record.
  - name: CurrencyCode
    description: Code value that identifies a currency.
  - name: CountryCode
    description: Code value that identifies a country or jurisdiction.
  - name: MonetaryAmount
    description: Decimal numeric value representing an amount of money.
  - name: Rate
    description: Decimal numeric value representing a ratio or percentage.
  - name: StatusCode
    description: Code value representing a lifecycle or operational status.
  - name: LegalName
    description: Text value representing a legal entity name.
  - name: RegulatorySegment
    description: Classification value representing a regulatory segment.
  - name: AssetType
    description: Classification value representing a collateral asset category.
  - name: Date
    description: Calendar date value.
semantic_model:
  datasets:
  - name: collateral_margin_report_lines
    source: reporting.collateral_margin_report_lines
    primary_key:
    - report_id
    - line_number
    description: Produced collateral margin report line records at report-line grain,
      carrying the account, counterparty, collateral, valuation date, and eligible
      collateral value submitted for reporting.
    physical_kind: table
    fields:
    - name: report_id
      type: string
      nullable: false
      description: Identifier of the generated collateral margin report submission.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: report_id
    - name: line_number
      type: integer
      nullable: false
      description: Line sequence number within a collateral margin report submission.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: line_number
    - name: account_id
      type: string
      nullable: false
      description: Margin account identifier reported on the output line.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: account_id
    - name: counterparty_id
      type: string
      nullable: false
      description: Counterparty identifier reported on the output line.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: counterparty_id
    - name: collateral_id
      type: string
      nullable: false
      description: Collateral asset identifier reported on the output line.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: collateral_id
    - name: valuation_date
      type: date
      nullable: false
      description: Valuation date used for the reported collateral amount.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: valuation_date
    - name: eligible_collateral_value
      type: decimal
      nullable: false
      description: Reportable collateral value after applying haircut and eligibility
        calculation.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: eligible_collateral_value
  - name: collateral_positions
    source: collateral_master.collateral_positions
    primary_key:
    - collateral_id
    description: Collateral position records that describe pledged collateral assets
      assigned to margin accounts, including asset classification, currency, and issuer
      jurisdiction.
    physical_kind: table
    fields:
    - name: collateral_id
      type: string
      nullable: false
      description: Stable identifier for the pledged collateral asset position.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: collateral_id
    - name: account_id
      type: string
      nullable: false
      description: Margin account identifier to which the collateral position is assigned.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: account_id
    - name: asset_type
      type: string
      nullable: false
      description: Asset classification of the pledged collateral used for eligibility
        assessment.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: asset_type
    - name: currency
      type: string
      nullable: false
      description: Denomination currency of the pledged collateral position.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: currency
    - name: issuer_country
      type: string
      nullable: true
      description: Issuer jurisdiction of the pledged collateral asset when applicable
        for eligibility rules.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: issuer_country
  - name: collateral_valuations
    source: market_risk.collateral_valuations
    primary_key:
    - valuation_id
    description: Daily collateral valuation records that capture market value and
      haircut inputs for pledged assets at valuation-date grain.
    physical_kind: table
    fields:
    - name: valuation_id
      type: string
      nullable: false
      description: Stable identifier for a collateral valuation record.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: valuation_id
    - name: collateral_id
      type: string
      nullable: false
      description: Identifier of the pledged collateral asset being valued.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: collateral_id
    - name: valuation_date
      type: date
      nullable: false
      description: Business date on which the collateral market value and haircut
        are observed.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: valuation_date
    - name: market_value_amount
      type: decimal
      nullable: false
      description: Observed market value amount of the collateral before haircut adjustment.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: market_value_amount
    - name: haircut_rate
      type: decimal
      nullable: false
      description: Haircut percentage applied to collateral market value for eligibility
        calculation.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: haircut_rate
  - name: counterparties
    source: margin_core.counterparties
    primary_key:
    - counterparty_id
    description: Legal counterparty reference records used to identify reporting counterparties,
      domicile, and regulatory segmentation for collateral margin obligations.
    physical_kind: table
    fields:
    - name: counterparty_id
      type: string
      nullable: false
      description: Stable identifier for the legal counterparty reference record.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: counterparty_id
    - name: legal_name
      type: string
      nullable: false
      description: Registered legal name of the reporting counterparty.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: legal_name
    - name: domicile_country
      type: string
      nullable: false
      description: Country or jurisdiction where the counterparty is domiciled for
        regulatory classification.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: domicile_country
    - name: regulatory_segment
      type: string
      nullable: true
      description: Regulatory counterparty segment used for reporting categorization
        and eligibility rules.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: regulatory_segment
  - name: margin_accounts
    source: margin_core.margin_accounts
    primary_key:
    - account_id
    description: Margin account records that track collateralized account obligations,
      account status, base currency, and the linked counterparty used for margin reporting.
    physical_kind: table
    fields:
    - name: account_id
      type: string
      nullable: false
      description: Stable identifier for a margin account record at account grain.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: account_id
    - name: counterparty_id
      type: string
      nullable: false
      description: Identifier of the legal counterparty responsible for the margin
        account.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: counterparty_id
    - name: base_currency
      type: string
      nullable: false
      description: Currency in which the margin account obligation is primarily managed
        and reported.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: base_currency
    - name: account_status
      type: string
      nullable: false
      description: Operational status of the margin account used to determine reporting
        eligibility.
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: account_status
  relationships:
  - name: reference_counterparty
    from: margin_accounts
    to: counterparties
    from_columns:
    - counterparty_id
    to_columns:
    - counterparty_id
  - name: pledge_collateral
    from: collateral_positions
    to: margin_accounts
    from_columns:
    - account_id
    to_columns:
    - account_id
  - name: value_collateral
    from: collateral_valuations
    to: collateral_positions
    from_columns:
    - collateral_id
    to_columns:
    - collateral_id
  metrics:
  - name: eligible_collateral_value
    description: Market value after haircut for regulatory eligible collateral reporting.
    expression:
      dialects:
      - dialect: ANSI_SQL
        expression: collateral_valuations.market_value_amount * (1 - collateral_valuations.haircut_rate)
    ai_context:
      metric_type: calculated_report_measure
concept_mappings:
- concept: CollateralAsset
  object_mappings:
  - referent_mappings:
    - relationship: has_CollateralIdentifier
      expression: collateral_positions.collateral_id
  - referent_mappings:
    - relationship: has_CollateralIdentifier
      expression: collateral_margin_report_lines.collateral_id
  link_mappings:
  - object_mapping:
      referent_mappings:
      - relationship: has_CollateralIdentifier
        expression: collateral_positions.collateral_id
    children:
    - relationship: has_CollateralIdentifier
      object_mapping:
        concept: CollateralIdentifier
        expression: collateral_positions.collateral_id
    - relationship: has_AssetType
      object_mapping:
        concept: AssetType
        expression: collateral_positions.asset_type
    - relationship: has_AssetCurrency
      object_mapping:
        concept: CurrencyCode
        expression: collateral_positions.currency
    - relationship: has_IssuerCountry
      object_mapping:
        concept: CountryCode
        expression: collateral_positions.issuer_country
    - relationship: PART_OF_MarginAccount
      object_mapping:
        concept: MarginAccount
        referent_mappings:
        - relationship: has_AccountIdentifier
          expression: collateral_positions.account_id
  - object_mapping:
      referent_mappings:
      - relationship: has_CollateralIdentifier
        expression: collateral_margin_report_lines.collateral_id
    children:
    - relationship: has_CollateralIdentifier
      object_mapping:
        concept: CollateralIdentifier
        expression: collateral_margin_report_lines.collateral_id
- concept: CollateralValuation
  object_mappings:
  - referent_mappings:
    - relationship: has_ValuationIdentifier
      expression: collateral_valuations.valuation_id
  link_mappings:
  - object_mapping:
      referent_mappings:
      - relationship: has_ValuationIdentifier
        expression: collateral_valuations.valuation_id
    children:
    - relationship: has_ValuationIdentifier
      object_mapping:
        concept: ValuationIdentifier
        expression: collateral_valuations.valuation_id
    - relationship: has_ValuationDate
      object_mapping:
        concept: Date
        expression: collateral_valuations.valuation_date
    - relationship: has_MarketValueAmount
      object_mapping:
        concept: MonetaryAmount
        expression: collateral_valuations.market_value_amount
    - relationship: has_HaircutRate
      object_mapping:
        concept: Rate
        expression: collateral_valuations.haircut_rate
    - relationship: has_EligibleCollateralValue
      object_mapping:
        concept: MonetaryAmount
        expression: metric.eligible_collateral_value
    - relationship: VALUES_CollateralAsset
      object_mapping:
        concept: CollateralAsset
        referent_mappings:
        - relationship: has_CollateralIdentifier
          expression: collateral_valuations.collateral_id
- concept: Counterparty
  object_mappings:
  - referent_mappings:
    - relationship: has_CounterpartyIdentifier
      expression: counterparties.counterparty_id
  - referent_mappings:
    - relationship: has_CounterpartyIdentifier
      expression: collateral_margin_report_lines.counterparty_id
  link_mappings:
  - object_mapping:
      referent_mappings:
      - relationship: has_CounterpartyIdentifier
        expression: counterparties.counterparty_id
    children:
    - relationship: has_CounterpartyIdentifier
      object_mapping:
        concept: CounterpartyIdentifier
        expression: counterparties.counterparty_id
    - relationship: has_LegalName
      object_mapping:
        concept: LegalName
        expression: counterparties.legal_name
    - relationship: has_DomicileCountry
      object_mapping:
        concept: CountryCode
        expression: counterparties.domicile_country
    - relationship: has_RegulatorySegment
      object_mapping:
        concept: RegulatorySegment
        expression: counterparties.regulatory_segment
    - relationship: RELATED_TO_MarginAccount
      object_mapping:
        concept: MarginAccount
        referent_mappings:
        - relationship: has_AccountIdentifier
          expression: margin_accounts.account_id
  - object_mapping:
      referent_mappings:
      - relationship: has_CounterpartyIdentifier
        expression: collateral_margin_report_lines.counterparty_id
    children:
    - relationship: has_CounterpartyIdentifier
      object_mapping:
        concept: CounterpartyIdentifier
        expression: collateral_margin_report_lines.counterparty_id
- concept: MarginAccount
  object_mappings:
  - referent_mappings:
    - relationship: has_AccountIdentifier
      expression: margin_accounts.account_id
  - referent_mappings:
    - relationship: has_AccountIdentifier
      expression: collateral_margin_report_lines.account_id
  link_mappings:
  - object_mapping:
      referent_mappings:
      - relationship: has_AccountIdentifier
        expression: margin_accounts.account_id
    children:
    - relationship: has_AccountIdentifier
      object_mapping:
        concept: AccountIdentifier
        expression: margin_accounts.account_id
    - relationship: REFERENCES_Counterparty
      object_mapping:
        concept: Counterparty
        referent_mappings:
        - relationship: has_CounterpartyIdentifier
          expression: margin_accounts.counterparty_id
    - relationship: has_BaseCurrency
      object_mapping:
        concept: CurrencyCode
        expression: margin_accounts.base_currency
    - relationship: has_AccountStatus
      object_mapping:
        concept: StatusCode
        expression: margin_accounts.account_status
    - relationship: DEPENDS_ON_CollateralAsset
      object_mapping:
        concept: CollateralAsset
        referent_mappings:
        - relationship: has_CollateralIdentifier
          expression: collateral_positions.collateral_id
  - object_mapping:
      referent_mappings:
      - relationship: has_AccountIdentifier
        expression: collateral_margin_report_lines.account_id
    children:
    - relationship: has_AccountIdentifier
      object_mapping:
        concept: AccountIdentifier
        expression: collateral_margin_report_lines.account_id
mapping_edge_annotations:
- concept: CollateralAsset
  dataset: collateral_positions
  description: Pledged collateral asset source population mapped as CollateralAsset
    entity records.
- concept: CollateralAsset
  dataset: collateral_margin_report_lines
  description: Collateral asset identifiers as represented in the report-line dataset
    for requirement traceability.
- concept: CollateralValuation
  dataset: collateral_valuations
  description: Collateral valuation source population mapped as CollateralValuation
    entity records.
- concept: Counterparty
  dataset: counterparties
  description: Legal counterparty reference source population mapped as Counterparty
    entity records.
- concept: Counterparty
  dataset: collateral_margin_report_lines
  description: Counterparty identifiers as represented in the report-line dataset
    for requirement traceability.
- concept: MarginAccount
  dataset: margin_accounts
  description: Margin account source population mapped as MarginAccount entity records.
- concept: MarginAccount
  dataset: collateral_margin_report_lines
  description: Margin account identifiers as represented in the report-line dataset
    for requirement traceability.
reporting_requirements:
- name: 合格抵质押品报送需求
  type: ReportRequirement
  description: '监管/BRD要求每日生成保证金账户级合格抵质押品报表，用于说明每个保证金账户在估值日可计入监管口径的抵质押品资产、估值金额、监管折扣率和折扣后价值。需求还包括每日EOD生成、业务复核、异常估值说明和报表留痕；这些非数据类要求保留在本说明中，不强行建模为字段。

    '
  source: Collateral Margin Reporting BRD v1.0 section 3.2
  SLA: Daily EOD before 21:00 local time; business review and exception notes completed
    before submission.
  semantic_scope:
    concepts:
    - name: MarginAccount
      description: 需求需要 MarginAccount 作为保证金账户语义对象，用于说明每条报表记录归属的账户和账户级对账口径。
    - name: Counterparty
      description: 需求需要 Counterparty 作为交易对手语义对象，用于按法律实体或监管对象解释抵质押品暴露归属。
    - name: CollateralAsset
      description: 需求需要 CollateralAsset 作为抵质押品资产语义对象，用于识别参与合格抵质押品计算的资产或头寸。
    - name: CollateralValuation
      description: 需求需要 CollateralValuation 作为抵质押品估值语义对象，用于表达估值日期、市场价值、监管折扣率和折扣后价值。
    required_fields:
    - name: 保证金账户标识
      description: 需求需要保证金账户标识，用于确定每条报表记录归属的账户并支持账户级对账。
      semantic_reference: MarginAccount.has_AccountIdentifier
      required: true
    - name: 交易对手标识
      description: 需求需要交易对手标识，用于按法律实体或监管对象汇总抵质押品暴露。
      semantic_reference: Counterparty.has_CounterpartyIdentifier
      required: true
    - name: 抵质押品标识
      description: 需求需要抵质押品标识，用于识别参与合格抵质押品计算的具体资产或头寸。
      semantic_reference: CollateralAsset.has_CollateralIdentifier
      required: true
    - name: 估值日期
      description: 需求需要估值日期，用于说明抵质押品价值和折扣率适用的报告日期。
      semantic_reference: CollateralValuation.has_ValuationDate
      required: true
    - name: 抵质押品折扣前市场价值
      description: 需求需要抵质押品折扣前市场价值，用于作为合格抵质押品价值计算的基础金额。
      semantic_reference: CollateralValuation.has_MarketValueAmount
      required: true
    - name: 监管折扣率
      description: 需求需要监管折扣率，用于从市场价值计算监管口径下可计入的合格抵质押品价值。
      semantic_reference: CollateralValuation.has_HaircutRate
      required: true
    controls:
    - name: valuation_date_present
      target: CollateralValuation.has_ValuationDate
      rule: Valuation date must be present.
    - name: haircut_non_negative
      target: CollateralValuation.has_HaircutRate
      rule: Haircut rate must be greater than or equal to zero.
  calculations:
  - name: 折扣后合格抵质押品价值
    description: 需求需要折扣后合格抵质押品价值，用于展示监管口径下可计入的抵质押品金额。
    output: CollateralValuation.has_EligibleCollateralValue
    inputs:
    - CollateralValuation.has_MarketValueAmount
    - CollateralValuation.has_HaircutRate
    expression: CollateralValuation.has_MarketValueAmount * (1 - CollateralValuation.has_HaircutRate)

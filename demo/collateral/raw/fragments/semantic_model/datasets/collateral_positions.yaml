name: collateral_positions
source: collateral_master.collateral_positions
primary_key:
- collateral_id
description: Collateral position records that describe pledged collateral assets assigned
  to margin accounts, including asset classification, currency, and issuer jurisdiction.
physical_kind: table
fields:
- name: collateral_id
  type: string
  nullable: false
  description: Stable identifier for the pledged collateral asset position.
  expression:
    dialects:
    - dialect: ANSI_SQL
      expression: collateral_id
- name: account_id
  type: string
  nullable: false
  description: Margin account identifier to which the collateral position is assigned.
  expression:
    dialects:
    - dialect: ANSI_SQL
      expression: account_id
- name: asset_type
  type: string
  nullable: false
  description: Asset classification of the pledged collateral used for eligibility
    assessment.
  expression:
    dialects:
    - dialect: ANSI_SQL
      expression: asset_type
- name: currency
  type: string
  nullable: false
  description: Denomination currency of the pledged collateral position.
  expression:
    dialects:
    - dialect: ANSI_SQL
      expression: currency
- name: issuer_country
  type: string
  nullable: true
  description: Issuer jurisdiction of the pledged collateral asset when applicable
    for eligibility rules.
  expression:
    dialects:
    - dialect: ANSI_SQL
      expression: issuer_country

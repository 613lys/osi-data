    - relationship: has_AccountIdentifier
      expression: deposit_accounts.account_id
  - referent_mappings:
    - relationship: has_AccountIdentifier
      expression: deposit_liquidity_report_lines.account_id
  link_mappings:
  - object_mapping:
      referent_mappings:
      - relationship: has_AccountIdentifier
        expression: deposit_accounts.account_id
    children:
    - relationship: has_AccountIdentifier
      object_mapping:
        concept: AccountIdentifier
        expression: deposit_accounts.account_id
    - relationship: has_AsOfDate
      object_mapping:
        concept: CalendarDate
        expression: deposit_accounts.as_of_date
    - relationship: REFERENCES_Depositor
      object_mapping:
        concept: Depositor
        referent_mappings:
        - relationship: has_CustomerIdentifier
          expression: deposit_accounts.customer_id
    - relationship: REFERENCES_DepositProduct

scenario:
  ontology_name: DepositLiquidityReportingOntology
  description: OSI scenario for deposit liquidity and stable funding regulatory reporting
    built from deposit account, customer, product, and prepared report-line metadata.
  mapping_name: DepositLiquiditySemanticMapping
  semantic_model_name: DepositLiquiditySemanticModel
  semantic_model_description: Semantic model for deposit liquidity reporting across
    account balances, customer master data, product runoff parameters, and prepared
    report lines.
  model_version: 1.0.0
  owner: Treasury Liquidity Regulatory Reporting
  source_systems:
  - core_deposit
  - customer_master
  - product_master
  - liquidity_risk_engine
ontology:
  base_entities:
  - name: AccountData
    description: Base concept for account-like records with common account identifiers
      and reporting dates.
    identify_by:
    - has_AccountIdentifier
    relationships:
    - name: has_AccountIdentifier
      roles:
      - concept: AccountIdentifier
      multiplicity: OneToOne
      verbalizes:
      - '{AccountData} has account identifier {AccountIdentifier}'
      description: Stable account identifier common to account-like records.
    - name: has_AsOfDate
      roles:
      - concept: CalendarDate
      multiplicity: ManyToOne
      verbalizes:
      - '{AccountData} has reporting date {CalendarDate}'
      description: Reporting or snapshot date common to account-like records.
  - name: CustomerData
    description: Base concept for customer-like records with common identifiers and
      domicile attributes.
    identify_by:
    - has_CustomerIdentifier
    relationships:
    - name: has_CustomerIdentifier
      roles:
      - concept: CustomerIdentifier
      multiplicity: OneToOne
      verbalizes:
      - '{CustomerData} has customer identifier {CustomerIdentifier}'
      description: Stable customer identifier common to customer-like records.
    - name: has_DomicileCountry
      roles:
      - concept: CountryCode
      multiplicity: ManyToOne
      verbalizes:
      - '{CustomerData} has domicile country {CountryCode}'
      description: Country or jurisdiction associated with a customer record.
  - name: ProductData
    description: Base concept for product-like records with common product identifiers
      and classifications.
    identify_by:
    - has_ProductIdentifier
    relationships:
    - name: has_ProductIdentifier
      roles:
      - concept: ProductIdentifier
      multiplicity: OneToOne
      verbalizes:
      - '{ProductData} has product identifier {ProductIdentifier}'
      description: Stable product identifier common to product-like records.
    - name: has_ProductType
      roles:
      - concept: ProductType
      multiplicity: ManyToOne
      verbalizes:
      - '{ProductData} has product type {ProductType}'
      description: Classification value identifying the product family or instrument
        type.
  entity_types:
  - name: DepositAccount
    description: Deposit account balance position that can be assessed for liquidity
      reporting and stable funding treatment.
    extends:
    - AccountData
    identify_by:
    - has_AccountIdentifier
    relationships:
    - name: REFERENCES_Depositor
      roles:
      - concept: Depositor
      multiplicity: ManyToOne
      verbalizes:
      - '{DepositAccount} is held by {Depositor}'
      description: Customer or legal entity that owns or controls the deposit account
        balance.
    - name: REFERENCES_DepositProduct
      roles:
      - concept: DepositProduct
      multiplicity: ManyToOne
      verbalizes:
      - '{DepositAccount} uses deposit product {DepositProduct}'
      description: Deposit product definition used to classify runoff and insurance
        treatment for the account.
    - name: has_DepositBalanceAmount
      roles:
      - concept: MonetaryAmount
      multiplicity: ManyToOne
      verbalizes:
      - '{DepositAccount} has deposit balance amount {MonetaryAmount}'
      description: Booked deposit balance amount measured for liquidity reporting.
    - name: has_DepositCurrency
      roles:
      - concept: CurrencyCode
      multiplicity: ManyToOne
      verbalizes:
      - '{DepositAccount} has deposit currency {CurrencyCode}'
      description: Currency in which the deposit account balance is maintained.
    - name: has_LiquidityBucket
      roles:
      - concept: LiquidityBucket
      multiplicity: ManyToOne
      verbalizes:
      - '{DepositAccount} has liquidity bucket {LiquidityBucket}'
      description: Liquidity classification bucket applied to the deposit account
        balance.
    - name: has_RunoffRate
      roles:
      - concept: Rate
      multiplicity: ManyToOne
      verbalizes:
      - '{DepositAccount} has runoff rate {Rate}'
      description: Liquidity runoff rate applied to the deposit balance for stable
        funding analysis.
    - name: has_StableFundingAmount
      roles:
      - concept: MonetaryAmount
      multiplicity: ManyToOne
      verbalizes:
      - '{DepositAccount} has stable funding amount {MonetaryAmount}'
      description: Calculated stable funding contribution after applying the applicable
        runoff or stability rate.
    - name: has_InsuredBalanceAmount
      roles:
      - concept: MonetaryAmount
      multiplicity: ManyToOne
      verbalizes:
      - '{DepositAccount} has insured balance amount {MonetaryAmount}'
      description: Portion of the deposit balance covered by product-level deposit
        insurance limits.
  - name: Depositor
    description: Customer or legal entity that owns deposit account balances included
      in liquidity reporting.
    extends:
    - CustomerData
    identify_by:
    - has_CustomerIdentifier
    relationships:
    - name: has_CustomerName
      roles:
      - concept: PersonOrEntityName
      multiplicity: ManyToOne
      verbalizes:
      - '{Depositor} has customer name {PersonOrEntityName}'
      description: Display name of the customer or legal entity holding deposit accounts.
    - name: has_CustomerSegment
      roles:
      - concept: CustomerSegment
      multiplicity: ManyToOne
      verbalizes:
      - '{Depositor} has customer segment {CustomerSegment}'
      description: Customer segment used for liquidity reporting and runoff classification.
  - name: DepositProduct
    description: Product definition that classifies deposit balances for liquidity
      runoff and insurance treatment.
    extends:
    - ProductData
    identify_by:
    - has_ProductIdentifier
    relationships:
    - name: has_RegulatoryClass
      roles:
      - concept: RegulatoryClass
      multiplicity: ManyToOne
      verbalizes:
      - '{DepositProduct} has regulatory class {RegulatoryClass}'
      description: Regulatory product class used for liquidity reporting aggregation.
    - name: has_InsuranceLimitAmount
      roles:
      - concept: MonetaryAmount
      multiplicity: ManyToOne
      verbalizes:
      - '{DepositProduct} has insurance limit amount {MonetaryAmount}'
      description: Product-level insured balance limit applied to eligible customer
        deposits.
    - name: has_StandardRunoffRate
      roles:
      - concept: Rate
      multiplicity: ManyToOne
      verbalizes:
      - '{DepositProduct} has standard runoff rate {Rate}'
      description: Standard runoff or stability rate assigned to the deposit product
        class.
  value_types:
  - name: AccountIdentifier
    description: Identifier value assigned to an account or account-like record.
  - name: CustomerIdentifier
    description: Identifier value assigned to a customer, depositor, or legal entity.
  - name: ProductIdentifier
    description: Identifier value assigned to a product definition.
  - name: CalendarDate
    description: Calendar date value used for reporting and business event timing.
  - name: MonetaryAmount
    description: Decimal numeric value representing an amount of money.
  - name: CurrencyCode
    description: Code value identifying a currency.
  - name: Rate
    description: Decimal ratio value representing a percentage, runoff rate, stability
      rate, or probability.
  - name: LiquidityBucket
    description: Classification value identifying a liquidity reporting bucket.
  - name: CustomerSegment
    description: Classification value identifying a customer or depositor segment.
  - name: PersonOrEntityName
    description: Name value representing a person, organization, or legal entity.
  - name: CountryCode
    description: Code value identifying a country or jurisdiction.
  - name: ProductType
    description: Classification value identifying the type of product.
  - name: RegulatoryClass
    description: Classification value used for regulatory reporting categories.
semantic_model:
  datasets:
  - name: deposit_accounts
    source: core_deposit.deposit_accounts
    primary_key:
    - account_id
    description: Deposit account balance records at account and reporting-date grain,
      carrying customer, product, amount, currency, liquidity bucket, and optional
      runoff override fields for liquidity reporting.
    physical_kind: table
    fields:
    - name: account_id
      type: string
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: account_id
      description: Source account identifier for a deposit account balance record.
    - name: customer_id
      type: string
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: customer_id
      description: Customer identifier linking the deposit account to the depositor
        master record.
    - name: product_id
      type: string
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: product_id
      description: Product identifier linking the deposit account to the deposit product
        definition.
    - name: as_of_date
      type: date
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: as_of_date
      description: Reporting date for the account balance snapshot.
    - name: balance_amount
      type: decimal
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: balance_amount
      description: Deposit balance amount measured on the reporting date.
    - name: currency
      type: string
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: currency
      description: Currency code for the deposit balance amount.
    - name: liquidity_bucket
      type: string
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: liquidity_bucket
      description: Liquidity bucket assigned to the account for reporting classification.
    - name: rate_override
      type: decimal
      nullable: true
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: rate_override
      description: Account-level runoff rate override when treasury has approved an
        account-specific rate.
  - name: deposit_customers
    source: customer_master.deposit_customers
    primary_key:
    - customer_id
    description: Depositor master records carrying names, customer segments, and domicile
      countries used to classify deposit liquidity reporting populations.
    physical_kind: table
    fields:
    - name: customer_id
      type: string
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: customer_id
      description: Master customer identifier for a depositor or legal entity.
    - name: customer_name
      type: string
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: customer_name
      description: Human-readable depositor or legal entity name.
    - name: segment
      type: string
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: segment
      description: Customer segment used for liquidity classification and management
        reporting.
    - name: domicile_country
      type: string
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: domicile_country
      description: Country or jurisdiction associated with the depositor.
  - name: deposit_liquidity_report_lines
    source: query.deposit_liquidity_report_lines
    primary_key:
    - account_id
    - as_of_date
    description: Prepared deposit liquidity report line records at account and reporting-date
      grain, carrying normalized depositor, product, balance, runoff, insured amount,
      and stable funding fields consumed by reporting logic.
    physical_kind: query
    custom_extensions:
    - name: physical_source
      value:
        kind: query
        description: Prepared report-line dataset is produced by a documented query
          that joins account balances, depositor master data, and deposit product
          parameters before reporting.
        sql: 'select account_id, as_of_date, customer_id, product_id, balance_amount,
          currency, liquidity_bucket, runoff_rate, stable_funding_amount, insured_balance_amount

          from liquidity_risk_engine.deposit_liquidity_report_lines

          where as_of_date = :as_of_date

          '
        depends_on:
        - core_deposit.deposit_accounts
        - customer_master.deposit_customers
        - product_master.deposit_products
    fields:
    - name: account_id
      type: string
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: deposit_accounts.account_id
      description: Account identifier reported on the deposit liquidity line.
    - name: as_of_date
      type: date
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: deposit_accounts.as_of_date
      description: Reporting date carried on the deposit liquidity line.
    - name: customer_id
      type: string
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: deposit_accounts.customer_id
      description: Depositor identifier reported for account ownership and aggregation.
    - name: product_id
      type: string
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: deposit_accounts.product_id
      description: Deposit product identifier reported for product-class aggregation.
    - name: balance_amount
      type: decimal
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: deposit_accounts.balance_amount
      description: Deposit balance amount reported for liquidity measurement.
    - name: currency
      type: string
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: deposit_accounts.currency
      description: Currency code reported for the deposit balance amount.
    - name: liquidity_bucket
      type: string
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: deposit_accounts.liquidity_bucket
      description: Liquidity bucket reported for regulatory classification.
    - name: runoff_rate
      type: decimal
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: COALESCE(deposit_accounts.rate_override, deposit_products.standard_runoff_rate)
      description: Runoff rate reported after applying account override or product
        standard rate.
    - name: stable_funding_amount
      type: decimal
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: deposit_accounts.balance_amount * COALESCE(deposit_accounts.rate_override,
            deposit_products.standard_runoff_rate)
      description: Calculated stable funding amount reported after applying the runoff
        or stability rate.
    - name: insured_balance_amount
      type: decimal
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: CASE WHEN deposit_accounts.balance_amount <= deposit_products.insurance_limit_amount
            THEN deposit_accounts.balance_amount ELSE deposit_products.insurance_limit_amount
            END
      description: Insured portion of the deposit balance reported under the product
        insurance limit.
  - name: deposit_products
    source: product_master.deposit_products
    primary_key:
    - product_id
    description: Deposit product reference records defining product type, regulatory
      class, standard runoff rate, and insurance limit used in liquidity calculations.
    physical_kind: table
    fields:
    - name: product_id
      type: string
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: product_id
      description: Product identifier for the deposit product definition.
    - name: product_type
      type: string
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: product_type
      description: Deposit product type such as current account, savings, term deposit,
        or brokered deposit.
    - name: regulatory_class
      type: string
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: regulatory_class
      description: Regulatory liquidity class assigned to the deposit product.
    - name: standard_runoff_rate
      type: decimal
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: standard_runoff_rate
      description: Standard runoff or stability rate assigned by product policy.
    - name: insurance_limit_amount
      type: decimal
      nullable: false
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: insurance_limit_amount
      description: Maximum insured balance amount applicable to the deposit product.
  relationships:
  - name: deposit_account_customer
    from: deposit_accounts
    to: deposit_customers
    from_columns:
    - customer_id
    to_columns:
    - customer_id
    ai_context:
      description: Deposit account balances use customer_id to attach depositor segment
        and country attributes required for liquidity classification.
  - name: deposit_account_product
    from: deposit_accounts
    to: deposit_products
    from_columns:
    - product_id
    to_columns:
    - product_id
    ai_context:
      description: Deposit account balances join to product definitions through product_id
        to obtain liquidity class, runoff rate, and insurance limit reference data.
  - name: report_line_customer
    from: deposit_liquidity_report_lines
    to: deposit_customers
    from_columns:
    - customer_id
    to_columns:
    - customer_id
    ai_context:
      description: Prepared deposit report lines reconcile to depositor master records
        through customer_id for customer-level liquidity review.
  - name: report_line_product
    from: deposit_liquidity_report_lines
    to: deposit_products
    from_columns:
    - product_id
    to_columns:
    - product_id
    ai_context:
      description: Prepared deposit report lines join to product reference data through
        product_id to validate reported product liquidity classification.
  metrics:
  - name: stable_funding_amount
    description: Stable funding amount calculated from deposit balance and the account
      override or product standard runoff rate.
    expression:
      dialects:
      - dialect: ANSI_SQL
        expression: deposit_accounts.balance_amount * COALESCE(deposit_accounts.rate_override,
          deposit_products.standard_runoff_rate)
    ai_context:
      metric_type: liquidity_stability_measure
  - name: insured_balance_amount
    description: Insured balance amount calculated as the lower of account balance
      and product insurance limit.
    expression:
      dialects:
      - dialect: ANSI_SQL
        expression: CASE WHEN deposit_accounts.balance_amount <= deposit_products.insurance_limit_amount
          THEN deposit_accounts.balance_amount ELSE deposit_products.insurance_limit_amount
          END
    ai_context:
      metric_type: insured_deposit_measure
